# kbManage 后端开发配置（默认文件）
# 使用方式：
#   1) 在 backend 目录运行：go run ./cmd/server
#   2) 如需指定其他配置：CONFIG_FILE=/path/to/config.yaml go run ./cmd/server

server:
  # HTTP 监听地址
  # 示例：":8080" 或 "0.0.0.0:8080"
  # 当前与 frontend/.env.development 中 VITE_API_BASE_URL=http://localhost:8888/api/v1 对齐
  http_addr: "0.0.0.0:8888"

mysql:
  # MySQL 连接信息
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "123456"
  database: "kb_manage"
  # 是否在 DSN 中启用 parseTime
  parse_time: true

redis:
  # Redis 连接信息
  addr: "127.0.0.1:6379"
  password: ""
  db: 2

security:
  # JWT 签名密钥（开发环境示例值，生产必须替换）
  jwt_secret: "dev-secret-change-me"
  # 访问令牌过期时间（Go duration 格式）
  access_token_ttl: "15m"
  # 刷新令牌过期时间（Go duration 格式）
  refresh_token_ttl: "168h"

bootstrap:
  admin:
    # 是否默认初始化管理员账号（开发环境建议开启）
    enabled: true
    # 默认管理员用户名
    username: "admin"
    # 默认管理员密码（请按需修改）
    password: "Admin@123456"
    # 默认管理员显示名
    display_name: "Administrator"
    # 默认管理员邮箱
    email: "admin@kbmanage.local"

cors:
  # 允许跨域来源（建议按实际前端地址维护）
  allow_origins:
    - "http://127.0.0.1:5000"
    - "http://localhost:5000"
  # 允许的 HTTP 方法
  allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  # 允许的请求头
  allow_headers: ["Authorization", "Content-Type", "X-Request-Id"]
  # 暴露给浏览器的响应头
  expose_headers: ["X-Request-Id"]
  # 是否允许携带 Cookie/认证头
  allow_credentials: true
  # 预检请求缓存秒数
  max_age_seconds: 600

observability:
  metrics:
    # Prometheus 兼容查询端点
    base_url: "http://127.0.0.1:9090"
    # 认证凭据引用键（如无可留空）
    auth_secret_ref: ""
    # 查询超时（Go duration）
    timeout: "10s"
  logs:
    # Loki 兼容查询端点
    base_url: "http://127.0.0.1:3100"
    auth_secret_ref: ""
    timeout: "15s"
  alerts:
    # Alertmanager 兼容端点
    base_url: "http://127.0.0.1:9093"
    auth_secret_ref: ""
    timeout: "10s"
  cache:
    # 查询缓存时长
    query_ttl: "30s"
    # 告警运行态同步轮询间隔
    sync_interval: "30s"

workloadops:
  actions:
    # 单资源动作默认超时
    default_timeout: "2m"
    # 动作幂等窗口
    idempotency_ttl: "10m"
  batch:
    # 单次批量任务最大目标数
    max_targets: 50
    # 批量执行并发上限
    concurrency: 5
  terminal:
    # 终端会话空闲超时
    idle_timeout: "15m"
    # 终端短会话 token 有效期
    token_ttl: "30m"
  audit:
    # 工作负载高风险审计保留天数
    retention_days: 180

gitops:
  sources:
    # Git 仓库来源连通性探测与拉取超时
    git_timeout: "30s"
    # Helm/OCI 等发布来源探测超时
    package_timeout: "45s"
    # 来源健康检查轮询超时
    healthcheck_timeout: "10s"
  sync:
    # 单次同步/重同步默认执行超时
    default_timeout: "5m"
    # 单次同步最大并发目标数
    max_parallel_targets: 10
    # 漂移扫描间隔
    drift_scan_interval: "1m"
  diff:
    # 差异摘要缓存时长
    cache_ttl: "30s"
    # 差异缓存最大条目数
    max_entries: 1000
    # 是否忽略 last-applied 注解导致的噪音差异
    ignore_last_applied_annotation: true
  release:
    # 发布历史保留天数
    history_retention_days: 180
    # 单交付单元最大并发发布动作数
    max_concurrent_operations: 3
    # 环境阶段推进超时时间
    stage_progress_deadline: "30m"
  audit:
    # GitOps 审计保留天数
    retention_days: 365
    # 审计写入时是否脱敏密钥类字段
    redact_secrets: true

securityPolicy:
  policy:
    # 策略分发默认超时
    distribution_timeout: "2m"
    # 单次策略分发最大并发目标数
    max_parallel_targets: 20
  exception:
    # 例外最长期限（小时）
    max_duration_hours: 168
    # 例外到期扫描间隔
    expiry_scan_interval: "1m"
  cache:
    # 策略分发进度缓存 TTL
    distribution_ttl: "10m"
    # 例外状态缓存 TTL
    exception_ttl: "30m"
  audit:
    # 策略治理审计保留天数
    retention_days: 365
