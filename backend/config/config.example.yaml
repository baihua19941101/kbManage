# kbManage 后端配置模板
# 复制为 config.dev.yaml 或其他环境配置后再使用。

server:
  # 默认监听地址（开发建议与 frontend/.env.development 的 VITE_API_BASE_URL 保持一致）
  http_addr: ":8080"

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "<change-me>"
  database: "kbmanage"
  parse_time: true

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

security:
  jwt_secret: "<change-me>"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"

bootstrap:
  admin:
    enabled: true
    username: "admin"
    password: "<change-me>"
    display_name: "Administrator"
    email: "admin@kbmanage.local"

cors:
  # 前端开发默认端口由 frontend/.env.development 中 VITE_PORT 控制（默认 5000）
  allow_origins:
    - "http://127.0.0.1:5000"
    - "http://localhost:5000"
  allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allow_headers: ["Authorization", "Content-Type", "X-Request-Id"]
  expose_headers: ["X-Request-Id"]
  allow_credentials: true
  max_age_seconds: 600

observability:
  metrics:
    # Prometheus 兼容查询端点（例如: http://prometheus:9090）
    base_url: ""
    # 可选：认证凭据引用键（由后端安全存储解析）
    auth_secret_ref: ""
    # 查询超时，Go duration 格式
    timeout: "10s"
  logs:
    # Loki 兼容查询端点（例如: http://loki:3100）
    base_url: ""
    auth_secret_ref: ""
    timeout: "15s"
  alerts:
    # Alertmanager 兼容端点（例如: http://alertmanager:9093）
    base_url: ""
    auth_secret_ref: ""
    timeout: "10s"
  cache:
    # 查询缓存 TTL，Go duration 格式
    query_ttl: "30s"
    # 告警运行态同步间隔，Go duration 格式（生产建议 >= 30s）
    sync_interval: "30s"

workloadops:
  actions:
    # 单资源动作默认超时（Go duration）
    default_timeout: "2m"
    # 幂等窗口（Go duration）
    idempotency_ttl: "10m"
  batch:
    # 批量任务最大目标数
    max_targets: 50
    # 批量执行并发上限
    concurrency: 5
  terminal:
    # 终端会话空闲超时（Go duration）
    idle_timeout: "15m"
    # 终端短会话 token 过期（Go duration）
    token_ttl: "30m"
  audit:
    # 高风险运维审计保留天数（默认与全局审计策略一致或更高）
    retention_days: 180
