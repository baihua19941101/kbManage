# kbManage 后端配置模板
# 复制为 config.dev.yaml 或其他环境配置后再使用。

server:
  http_addr: ":8080"

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "<change-me>"
  database: "kbmanage"
  parse_time: true

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

security:
  jwt_secret: "<change-me>"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"

bootstrap:
  admin:
    enabled: true
    username: "admin"
    password: "<change-me>"
    display_name: "Administrator"
    email: "admin@kbmanage.local"

cors:
  allow_origins:
    - "http://127.0.0.1:5000"
    - "http://localhost:5000"
  allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allow_headers: ["Authorization", "Content-Type", "X-Request-Id"]
  expose_headers: ["X-Request-Id"]
  allow_credentials: true
  max_age_seconds: 600
