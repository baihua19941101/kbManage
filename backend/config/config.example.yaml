# kbManage 后端配置模板
# 复制为 config.dev.yaml 或其他环境配置后再使用。

server:
  # 默认监听地址（开发建议与 frontend/.env.development 的 VITE_API_BASE_URL 保持一致）
  http_addr: ":8080"

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "<change-me>"
  database: "kbmanage"
  parse_time: true

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

security:
  jwt_secret: "<change-me>"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"

bootstrap:
  admin:
    enabled: true
    username: "admin"
    password: "<change-me>"
    display_name: "Administrator"
    email: "admin@kbmanage.local"

cors:
  # 前端开发默认端口由 frontend/.env.development 中 VITE_PORT 控制（默认 5000）
  allow_origins:
    - "http://127.0.0.1:5000"
    - "http://localhost:5000"
  allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allow_headers: ["Authorization", "Content-Type", "X-Request-Id"]
  expose_headers: ["X-Request-Id"]
  allow_credentials: true
  max_age_seconds: 600

observability:
  metrics:
    # Prometheus 兼容查询端点（例如: http://prometheus:9090）
    base_url: ""
    # 可选：认证凭据引用键（由后端安全存储解析）
    auth_secret_ref: ""
    # 查询超时，Go duration 格式
    timeout: "10s"
  logs:
    # Loki 兼容查询端点（例如: http://loki:3100）
    base_url: ""
    auth_secret_ref: ""
    timeout: "15s"
  alerts:
    # Alertmanager 兼容端点（例如: http://alertmanager:9093）
    base_url: ""
    auth_secret_ref: ""
    timeout: "10s"
  cache:
    # 查询缓存 TTL，Go duration 格式
    query_ttl: "30s"
    # 告警运行态同步间隔，Go duration 格式（生产建议 >= 30s）
    sync_interval: "30s"

workloadops:
  actions:
    # 单资源动作默认超时（Go duration）
    default_timeout: "2m"
    # 幂等窗口（Go duration）
    idempotency_ttl: "10m"
  batch:
    # 批量任务最大目标数
    max_targets: 50
    # 批量执行并发上限
    concurrency: 5
  terminal:
    # 终端会话空闲超时（Go duration）
    idle_timeout: "15m"
    # 终端短会话 token 过期（Go duration）
    token_ttl: "30m"
  audit:
    # 高风险运维审计保留天数（默认与全局审计策略一致或更高）
    retention_days: 180

gitops:
  sources:
    # Git 仓库来源连通性探测与拉取超时（Go duration）
    git_timeout: "30s"
    # Helm/OCI 等发布来源探测超时（Go duration）
    package_timeout: "45s"
    # 来源健康检查轮询超时（Go duration）
    healthcheck_timeout: "10s"
  sync:
    # 单次同步/重同步默认执行超时（Go duration）
    default_timeout: "5m"
    # 单次同步最大并发目标数
    max_parallel_targets: 10
    # 漂移扫描间隔（Go duration）
    drift_scan_interval: "1m"
  diff:
    # 差异摘要缓存时长（Go duration）
    cache_ttl: "30s"
    # 差异缓存最大条目数
    max_entries: 1000
    # 是否忽略 last-applied 注解导致的噪音差异
    ignore_last_applied_annotation: true
  release:
    # 发布历史保留天数
    history_retention_days: 180
    # 单交付单元最大并发发布动作数
    max_concurrent_operations: 3
    # 环境阶段推进超时时间（Go duration）
    stage_progress_deadline: "30m"
  audit:
    # GitOps 审计保留天数
    retention_days: 365
    # 审计写入时是否脱敏密钥类字段
    redact_secrets: true

securityPolicy:
  policy:
    # 策略分发默认超时（Go duration）
    distribution_timeout: "2m"
    # 单次策略分发最大并发目标数
    max_parallel_targets: 20
  exception:
    # 例外最长期限（小时）
    max_duration_hours: 168
    # 例外到期扫描间隔（Go duration）
    expiry_scan_interval: "1m"
  cache:
    # 策略分发进度缓存 TTL（Go duration）
    distribution_ttl: "10m"
    # 例外状态缓存 TTL（Go duration）
    exception_ttl: "30m"
  audit:
    # 策略治理审计保留天数
    retention_days: 365

compliance:
  baselines:
    # 基线包来源，可为本地目录、对象存储前缀或镜像仓库引用
    source_ref: "file://./artifacts/compliance/baselines"
    # 基线快照缓存 TTL
    snapshot_cache_ttl: "10m"
  scan:
    # 默认扫描超时
    default_timeout: "20m"
    # 同时运行的最大扫描任务数
    max_parallel_executions: 2
    # 计划性扫描轮询间隔
    scheduler_interval: "1m"
  export:
    # 归档导出任务保留时长
    retention_ttl: "168h"
  audit:
    # 合规审计保留天数
    retention_days: 365

clusterLifecycle:
  driver:
    # 驱动连通性或元数据探测超时
    probe_timeout: "20s"
    # 驱动版本缓存 TTL
    version_cache_ttl: "10m"
  validation:
    # 创建前或升级前校验默认超时
    default_timeout: "2m"
    # 校验结果缓存 TTL
    result_cache_ttl: "5m"
  operation:
    # 创建、升级、退役等生命周期动作默认超时
    default_timeout: "30m"
    # 生命周期动作幂等窗口
    idempotency_ttl: "15m"
    # 集群关键动作互斥锁 TTL
    lock_ttl: "30m"
  nodePool:
    # 单次节点池扩缩最大目标容量调整幅度
    max_step: 20
  audit:
    # 集群生命周期审计保留天数
    retention_days: 365

backupRestore:
  executor:
    # 备份执行器默认超时
    default_timeout: "30m"
    # 恢复点或执行清单缓存 TTL
    manifest_cache_ttl: "10m"
  precheck:
    # 恢复或迁移前校验默认超时
    default_timeout: "2m"
    # 校验结果缓存 TTL
    result_cache_ttl: "5m"
  operation:
    # 恢复、迁移和演练动作默认超时
    default_timeout: "45m"
    # 关键动作幂等窗口
    idempotency_ttl: "15m"
    # 互斥锁 TTL
    lock_ttl: "45m"
  retention:
    # 默认恢复点保留时间
    default_restore_point_ttl: "168h"
  drill:
    # 默认 RPO 目标（分钟）
    default_rpo_target_minutes: 30
    # 默认 RTO 目标（分钟）
    default_rto_target_minutes: 60
  audit:
    # 备份恢复与灾备审计保留天数
    retention_days: 365

identityTenancy:
  source:
    # 身份源健康检查与目录同步超时
    healthcheck_timeout: "20s"
    # 身份源同步结果缓存 TTL
    sync_result_ttl: "10m"
  session:
    # 会话治理缓存 TTL
    session_cache_ttl: "10m"
    # 权限回收协调窗口
    revocation_ttl: "15m"
  organization:
    # 组织与成员视图缓存 TTL
    membership_cache_ttl: "5m"
  audit:
    # 身份治理审计保留天数
    retention_days: 365

platformMarketplace:
  catalog:
    # 目录来源同步默认超时
    sync_timeout: "30s"
    # 目录缓存 TTL
    cache_ttl: "10m"
  distribution:
    # 模板分发/发布默认超时
    default_timeout: "2m"
    # 分发协调幂等窗口
    idempotency_ttl: "10m"
  extension:
    # 扩展注册与兼容性校验默认超时
    validation_timeout: "20s"
    # 扩展兼容性缓存 TTL
    compatibility_cache_ttl: "10m"
  audit:
    # 平台市场审计保留天数
    retention_days: 365

sreScale:
  health:
    # 平台健康总览聚合超时
    overview_timeout: "20s"
    # 平台健康快照缓存 TTL
    snapshot_cache_ttl: "30s"
  ha:
    # 故障切换状态缓存 TTL
    failover_cache_ttl: "5m"
    # 高可用检查默认超时
    check_timeout: "30s"
  upgrade:
    # 升级前检查默认超时
    precheck_timeout: "2m"
    # 升级滚动执行默认超时
    rollout_timeout: "45m"
    # 升级协调幂等窗口
    idempotency_ttl: "15m"
  scale:
    # 容量预测缓存 TTL
    forecast_cache_ttl: "10m"
    # 自诊断与压测证据分析默认超时
    analysis_timeout: "2m"
  audit:
    # SRE 与规模化治理审计保留天数
    retention_days: 365
